version: "3.9"

services:
  agent:
    build:
      # Build context is the PARENT directory containing both
      # content-quality-checker/ and content-quality-agent/
      context: ..
      dockerfile: content-quality-agent/Dockerfile
    image: content-quality-agent:latest
    container_name: content-quality-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      SKILL_PATH: /app/content-quality-checker
      PORT: 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
